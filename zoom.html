<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fractal Tunnel System</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
  canvas { position: absolute; top: 0; left: 0; }
</style>
</head>
<body>

<canvas id="trail"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const trailCanvas = document.getElementById("trail");
const tctx = trailCanvas.getContext("2d");

function resize() {
  trailCanvas.width = window.innerWidth;
  trailCanvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// THREE
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// FRACTAL GENERATOR
const objects = [];

function createFractalCluster(x, y, z, size, depth) {
  if (depth <= 0) return;

  const geoTypes = [
    new THREE.BoxGeometry(size,size,size),
    new THREE.TetrahedronGeometry(size),
    new THREE.OctahedronGeometry(size)
  ];

  const geo = geoTypes[Math.floor(Math.random()*geoTypes.length)];

  const mat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(`hsl(${Math.random()*360},100%,60%)`),
    wireframe: true,
    transparent: true,
    opacity: 0.8
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x,y,z);

  mesh.userData = {
    rot: Math.random()*0.02 + 0.01,
    offset: Math.random()*1000
  };

  scene.add(mesh);
  objects.push(mesh);

  // recursive branching (fractal)
  const branches = 3;
  for (let i = 0; i < branches; i++) {
    const angle = (i / branches) * Math.PI * 2;
    const nx = x + Math.cos(angle) * size * 2;
    const ny = y + Math.sin(angle) * size * 2;
    const nz = z - size * 4;

    createFractalCluster(nx, ny, nz, size * 0.6, depth - 1);
  }
}

// generate initial field
for (let i = 0; i < 5; i++) {
  createFractalCluster(
    (Math.random()-0.5)*10,
    (Math.random()-0.5)*10,
    -i * 20,
    1.5,
    3
  );
}

// interaction
let velocity = { x: 0, y: 0 };
let zoomPulse = 0;

document.addEventListener("mousemove", e => {
  velocity.x += e.movementX * 0.0007;
  velocity.y += e.movementY * 0.0007;
});

document.addEventListener("click", () => {
  zoomPulse = 1;
});

// animation
let speed = 0.2;

function animate() {
  requestAnimationFrame(animate);

  const t = Date.now() * 0.001;

  velocity.x *= 0.95;
  velocity.y *= 0.95;
  zoomPulse *= 0.92;

  scene.rotation.y += velocity.x;
  scene.rotation.x += velocity.y;

  // forward motion (tunnel)
  camera.position.z -= speed + zoomPulse * 0.5;

  // breathing zoom
  camera.fov = 75 + Math.sin(t*2)*10 + zoomPulse*20;
  camera.updateProjectionMatrix();

  objects.forEach(o => {
    o.rotation.x += o.userData.rot;
    o.rotation.y += o.userData.rot;

    // hue shift
    const hue = (t*40 + o.userData.offset) % 360;
    o.material.color.set(`hsl(${hue},100%,60%)`);

    // recycle objects behind camera
    if (o.position.z > camera.position.z + 10) {
      o.position.z -= 100;
    }
  });

  renderer.render(scene, camera);

  // TRAIL FEEDBACK
  tctx.fillStyle = "rgba(0,0,0,0.06)";
  tctx.fillRect(0, 0, trailCanvas.width, trailCanvas.height);
  tctx.drawImage(renderer.domElement, 0, 0);
}

animate();

// resize
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
